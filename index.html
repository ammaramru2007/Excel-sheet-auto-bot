<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sheet Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --ink:#13201c; --paper:#f6f3ea; --line:#dcd6c4;
    --moss:#3c6e5a; --moss-dark:#264a3c; --moss-pale:#e8efe9;
    --amber:#c97a3d; --red:#b0473a; --sans:'Space Grotesk',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{
    font-family:var(--sans); background:var(--paper); color:var(--ink);
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  header{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1.5px solid var(--ink); background:var(--paper); z-index:5;
  }
  .brand{display:flex; align-items:center; gap:8px;}
  .brand h1{font-size:1.15rem; margin:0; letter-spacing:-0.02em;}
  .brand h1 span{color:var(--moss);}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--moss); flex:0 0 auto;}
  #downloadTop{
    font-family:var(--mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em;
    background:var(--amber); color:#fff; border:none; padding:7px 12px; border-radius:6px; cursor:pointer;
    display:none;
  }
  #downloadTop.show{display:inline-block;}

  #chat{
    flex:1 1 auto; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px;
  }
  .msg{max-width:88%; padding:11px 14px; border-radius:14px; font-size:0.93rem; line-height:1.45; white-space:pre-wrap;}
  .msg.bot{
    background:#fffdf7; border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:4px;
  }
  .msg.user{
    background:var(--moss-dark); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;
  }
  .msg.system{
    align-self:center; background:transparent; color:#7a7563; font-family:var(--mono); font-size:0.74rem;
    border:none; text-align:center; max-width:100%;
  }
  .msg.typing{display:flex; gap:4px; align-items:center; padding:13px 16px;}
  .typing span{width:6px; height:6px; border-radius:50%; background:var(--moss); animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:0.15s;} .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0); opacity:0.4;} 30%{transform:translateY(-4px); opacity:1;}}

  .preview-card{
    align-self:stretch; max-width:100%; background:#fffdf7; border:1px solid var(--line); border-radius:10px;
    padding:12px; font-family:var(--mono);
  }
  .preview-card .pc-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .preview-card .pc-head b{font-family:var(--sans); font-size:0.85rem;}
  .preview-card .pc-head span{font-size:0.7rem; color:#7a7563;}
  .tablewrap{overflow-x:auto; max-height:260px; overflow-y:auto; border:1px solid var(--line); border-radius:6px;}
  table{border-collapse:collapse; width:100%; font-size:0.78rem;}
  th,td{border:1px solid var(--line); padding:5px 8px; text-align:left; white-space:nowrap;}
  th{background:var(--moss-dark); color:#fff; position:sticky; top:0;}
  td[contenteditable]{cursor:text;}
  td[contenteditable]:focus{outline:2px solid var(--moss); outline-offset:-2px; background:#fff8e8;}

  #composer{
    flex:0 0 auto; border-top:1.5px solid var(--ink); padding:10px 12px; background:var(--paper);
    display:flex; flex-direction:column; gap:8px;
  }
  .chips{display:flex; gap:6px; overflow-x:auto; padding-bottom:2px;}
  .chip{
    font-family:var(--mono); font-size:0.7rem; white-space:nowrap; background:var(--moss-pale);
    border:1px solid var(--line); padding:5px 9px; border-radius:14px; cursor:pointer; color:#3a4a40; flex:0 0 auto;
  }
  .chip:hover{background:#d9e4da;}
  .inputrow{display:flex; gap:8px; align-items:center;}
  #fileBtn, #micBtn{
    width:42px; height:42px; flex:0 0 42px; border-radius:50%; border:1.5px solid var(--ink);
    background:#fff; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  #micBtn.listening{background:var(--red); border-color:var(--red); color:#fff; animation:pulse 1.1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,71,58,0.5);} 50%{box-shadow:0 0 0 7px rgba(176,71,58,0);}}
  #msgInput{
    flex:1; padding:11px 14px; border:1.5px solid var(--ink); border-radius:22px; font-family:var(--sans);
    font-size:0.93rem; background:#fff;
  }
  #msgInput:focus{outline:2px solid var(--moss); outline-offset:1px;}
  #sendBtn{
    width:42px; height:42px; flex:0 0 42px; border-radius:50%; border:none; background:var(--moss);
    color:#fff; font-size:1.1rem; cursor:pointer;
  }
  #sendBtn:disabled{opacity:0.4;}
  #fileInput{display:none;}

  #ocrBarWrap{display:none; padding:0 2px;}
  #ocrBarWrap.show{display:block;}
  #ocrLabel{font-family:var(--mono); font-size:0.72rem; color:#7a7563;}
  #ocrBarTrack{height:6px; background:#e3e0d2; border-radius:3px; overflow:hidden; margin-top:4px;}
  #ocrBarFill{height:100%; width:0%; background:var(--moss); transition:width 0.2s;}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="dot"></div><h1>Sheet<span>Assistant</span></h1></div>
  <button id="downloadTop">⬇ Download .xlsx</button>
</header>

<div id="chat"></div>

<div id="composer">
  <div id="ocrBarWrap">
    <div id="ocrLabel">Reading file…</div>
    <div id="ocrBarTrack"><div id="ocrBarFill"></div></div>
  </div>
  <div class="chips" id="chips"></div>
  <div class="inputrow">
    <button id="fileBtn" title="Attach file">📎</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf,.png,.jpg,.jpeg,.webp">
    <input id="msgInput" type="text" placeholder="Type or tap 🎙 to speak…">
    <button id="micBtn" title="Voice">🎙</button>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
let rows = [];
let headers = [];
let conversation = []; // {role:'user'|'assistant', content:string}
const chat = document.getElementById('chat');
const msgInput = document.getElementById('msgInput');
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addPreviewCard(label) {
  const card = document.createElement('div');
  card.className = 'preview-card';
  const showRows = rows.slice(0, 50);
  let html = `<div class="pc-head"><b>${label}</b><span>${rows.length} rows × ${headers.length} cols</span></div>`;
  html += '<div class="tablewrap"><table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  showRows.forEach((r, i) => {
    html += '<tr>' + headers.map(h => `<td contenteditable="true" data-row="${i}" data-col="${h}">${r[h] === undefined ? '' : r[h]}</td>`).join('') + '</tr>';
  });
  html += '</tbody></table></div>';
  card.innerHTML = html;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
  card.querySelectorAll('td[contenteditable]').forEach(td => {
    td.addEventListener('blur', () => {
      const idx = parseInt(td.dataset.row, 10);
      rows[idx][td.dataset.col] = td.textContent.trim();
    });
  });
  document.getElementById('downloadTop').classList.add('show');
}

function setChips(list) {
  const chips = document.getElementById('chips');
  chips.innerHTML = '';
  list.forEach(text => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = text;
    c.addEventListener('click', () => { msgInput.value = text; sendMessage(); });
    chips.appendChild(c);
  });
}

setChips(['Sort by name', 'Sum a column', 'Build a budget tracker', 'Remove duplicates']);
addMsg('bot', "Hi! Attach a spreadsheet, PDF, or photo of a table — or just tell me what kind of sheet to build from scratch. Then talk to me however you'd talk to a person; I'll handle the rest.");

// ---------- File handling ----------
document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function showOcr(label, pct) {
  const wrap = document.getElementById('ocrBarWrap');
  wrap.classList.add('show');
  document.getElementById('ocrLabel').textContent = label;
  document.getElementById('ocrBarFill').style.width = pct + '%';
}
function hideOcr() { document.getElementById('ocrBarWrap').classList.remove('show'); }

async function handleFile(file) {
  addMsg('user', `📎 ${file.name}`);
  const ext = file.name.split('.').pop().toLowerCase();
  try {
    if (['xlsx', 'xls', 'csv'].includes(ext)) {
      await loadSpreadsheet(file);
    } else if (ext === 'pdf') {
      await loadPdf(file);
    } else if (['png', 'jpg', 'jpeg', 'webp'].includes(ext)) {
      await loadImage(file);
    } else {
      addMsg('bot', "I can't read that file type — try .xlsx, .csv, .pdf, or a photo (.jpg/.png).");
      return;
    }
    conversation.push({ role: 'user', content: `[Attached file "${file.name}" — extracted into a sheet with columns ${JSON.stringify(headers)} and ${rows.length} rows]` });
    addMsg('bot', `Got it — pulled ${rows.length} rows with columns ${headers.join(', ')}. Want me to clean anything up, sort it, or run a calculation?`);
    addPreviewCard(file.name);
  } catch (err) {
    hideOcr();
    addMsg('bot', "I couldn't read that file properly: " + (err.message || err));
  }
}

function loadSpreadsheet(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
        if (!json.length) { reject(new Error('That sheet looks empty.')); return; }
        rows = json; headers = Object.keys(json[0]);
        resolve();
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

function preprocessImage(imgEl) {
  const targetWidth = Math.max(imgEl.naturalWidth, 1800);
  const scale = targetWidth / imgEl.naturalWidth;
  const canvas = document.createElement('canvas');
  canvas.width = imgEl.naturalWidth * scale;
  canvas.height = imgEl.naturalHeight * scale;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    const v = gray > 165 ? 255 : (gray < 110 ? 0 : gray);
    d[i] = d[i + 1] = d[i + 2] = v;
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}
function fileToImageElement(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function loadImage(file) {
  showOcr('Reading text from image…', 5);
  const imgEl = await fileToImageElement(file);
  const canvas = preprocessImage(imgEl);
  const { data } = await Tesseract.recognize(canvas, 'eng', {
    tessedit_pageseg_mode: 6, preserve_interword_spaces: '1',
    logger: m => { if (m.status === 'recognizing text') showOcr('Reading text from image…', Math.round(m.progress * 100)); }
  });
  hideOcr();
  textToTable(data.text);
}

async function loadPdf(file) {
  showOcr('Reading PDF…', 5);
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let fullText = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const pageText = content.items.map(it => it.str).join(' ').trim();
    if (pageText.length > 20) {
      fullText += pageText + '\n';
      showOcr(`Reading page ${p} of ${pdf.numPages}…`, Math.round((p / pdf.numPages) * 100));
    } else {
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      const { data } = await Tesseract.recognize(canvas, 'eng', {
        tessedit_pageseg_mode: 6,
        logger: m => { if (m.status === 'recognizing text') showOcr(`OCR page ${p} of ${pdf.numPages}…`, Math.round(m.progress * 100)); }
      });
      fullText += data.text + '\n';
    }
  }
  hideOcr();
  textToTable(fullText);
}

function textToTable(text) {
  let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);
  lines = lines.filter(l => /[A-Za-z0-9]{2,}/.test(l));
  if (!lines.length) throw new Error('No readable text found.');

  const itemRegex = /^(\d{1,3})[\s.)\-]+(.{2,70}?)\s+([\d,]{2,}(?:\.\d+)?)\s*$/;
  const kvRegex = /^([A-Za-z][A-Za-z .&/'-]{2,35}?)\s*[:|]\s*(.{1,80})$/;
  const totalRegex = /^(total|grand total|net amount)\b.*?([\d,]{2,}(?:\.\d+)?)\s*$/i;
  const itemRows = [], kvRows = [], leftover = [];

  for (const line of lines) {
    let m = line.match(itemRegex);
    if (m && !/^total$/i.test(m[2].trim())) { itemRows.push({ 'S.No': m[1], 'Particulars': m[2].trim(), 'Amount': m[3].replace(/,/g, '') }); continue; }
    m = line.match(totalRegex);
    if (m) { kvRows.push({ 'S.No': '', 'Particulars': m[1].trim(), 'Amount': m[2].replace(/,/g, '') }); continue; }
    m = line.match(kvRegex);
    if (m) { kvRows.push({ 'S.No': '', 'Particulars': m[1].trim(), 'Amount': m[2].trim() }); continue; }
    leftover.push(line);
  }

  if (itemRows.length >= 2) {
    headers = ['S.No', 'Particulars', 'Amount'];
    rows = [...kvRows, ...itemRows];
    leftover.forEach(l => rows.push({ 'S.No': '', 'Particulars': l, 'Amount': '' }));
    return;
  }

  const splitLine = l => l.split(/\t+|\s{2,}/).map(c => c.trim()).filter(c => c.length);
  const parsedLines = lines.map(splitLine);
  const colCounts = parsedLines.map(p => p.length);
  const mostCommon = colCounts.sort((a, b) => colCounts.filter(v => v === a).length - colCounts.filter(v => v === b).length).pop();

  if (mostCommon > 1) {
    let dataLines = parsedLines.filter(p => p.length === mostCommon);
    const looksLikeHeader = dataLines[0] && dataLines[0].every(c => isNaN(parseFloat(c)));
    if (looksLikeHeader) { headers = dataLines[0]; dataLines = dataLines.slice(1); }
    else { headers = Array.from({ length: mostCommon }, (_, i) => `Column ${i + 1}`); }
    rows = dataLines.map(line => { const obj = {}; headers.forEach((h, i) => obj[h] = line[i] !== undefined ? line[i] : ''); return obj; });
  } else {
    headers = ['Line', 'Text'];
    rows = lines.map((l, i) => ({ Line: i + 1, Text: l }));
  }
}

// ---------- Chat / AI ----------
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  addMsg('user', text);
  conversation.push({ role: 'user', content: text });
  const typingEl = addTyping();
  document.getElementById('sendBtn').disabled = true;

  try {
    const sampleRows = rows.slice(0, 6);
    const dataContext = rows.length
      ? `Current sheet — columns: ${JSON.stringify(headers)}. Row count: ${rows.length}. Sample rows: ${JSON.stringify(sampleRows)}.`
      : `No spreadsheet loaded yet.`;

    const systemPrompt = `You are a friendly, concise spreadsheet assistant chatting with a user in a mobile chat UI. ${dataContext}

You can:
1. Just reply conversationally (answer questions, confirm understanding, ask for clarification) — for this, respond with plain text only, no code.
2. Modify the spreadsheet — if the user wants data sorted, calculated, filtered, cleaned, or a brand-new sheet built from a description, respond with plain text explaining what you did, THEN on a new line include a fenced code block like:
\`\`\`js
function transform(rows, headers) {
  // your logic here, operating on the rows array of objects and headers array of strings
  return { rows, headers };
}
\`\`\`
If building a brand-new sheet from scratch (no file uploaded), ignore the existing rows/headers and just construct new ones inside transform().
Only include a code block when the sheet should actually change. Keep your spoken reply short (1-3 sentences) — friendly chat tone, not a report.`;

    const apiMessages = conversation.slice(-12).map(m => ({ role: m.role, content: m.content }));

    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: systemPrompt,
        messages: apiMessages
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Server error');
    const fullText = (data.content || []).map(b => b.text || '').join('');

    const codeMatch = fullText.match(/```js\s*([\s\S]*?)```/i);
    const replyText = fullText.replace(/```js[\s\S]*?```/i, '').trim() || "Done.";

    typingEl.remove();
    addMsg('bot', replyText);
    conversation.push({ role: 'assistant', content: fullText });

    if (codeMatch) {
      const code = codeMatch[1].trim();
      try {
        const fn = new Function(`${code}\nreturn transform(arguments[0], arguments[1]);`);
        const result = fn(JSON.parse(JSON.stringify(rows)), [...headers]);
        if (result && Array.isArray(result.rows) && Array.isArray(result.headers)) {
          rows = result.rows; headers = result.headers;
          addPreviewCard('Updated sheet');
        }
      } catch (execErr) {
        addMsg('bot', "I tried to update the sheet but hit an error: " + execErr.message + ". Could you rephrase what you want?");
      }
    }
  } catch (err) {
    typingEl.remove();
    addMsg('bot', "Something went wrong reaching the assistant: " + (err.message || err));
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// ---------- Voice ----------
const micBtn = document.getElementById('micBtn');
if (SpeechRec) {
  const recognition = new SpeechRec();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onresult = (e) => { msgInput.value = e.results[0][0].transcript; sendMessage(); };
  recognition.onend = () => micBtn.classList.remove('listening');
  recognition.onerror = () => micBtn.classList.remove('listening');
  micBtn.addEventListener('click', () => { micBtn.classList.add('listening'); recognition.start(); });
} else {
  micBtn.disabled = true; micBtn.title = 'Voice not supported in this browser';
}

// ---------- Download ----------
document.getElementById('downloadTop').addEventListener('click', () => {
  if (!rows.length) return;
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, 'sheet-assistant-result.xlsx');
});
</script>
</body>
</html>
